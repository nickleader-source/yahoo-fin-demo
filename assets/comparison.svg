<svg xmlns="http://www.w3.org/2000/svg" width="780" height="300" viewBox="0 0 780 300">
  <defs>
    <style>
      .head { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; font-size: 14px; font-weight: 700; text-anchor: middle; }
      .row-label { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; font-size: 12px; fill: #a6adc8; }
      .cell { font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif; font-size: 12px; text-anchor: middle; }
      .bad { fill: #f38ba8; }
      .good { fill: #a6e3a1; }
      .neutral { fill: #f9e2af; }
      .divider { stroke: #313244; stroke-width: 1; }
    </style>
  </defs>

  <rect width="780" height="300" fill="#1e1e2e"/>

  <!-- Header row background -->
  <rect x="0" y="0" width="780" height="44" fill="#313244"/>

  <!-- Column headers -->
  <text x="200" y="27" class="head" fill="#a6adc8">Your concern</text>
  <text x="460" y="27" class="head" fill="#f38ba8">Sierra SDK (today)</text>
  <text x="660" y="27" class="head" fill="#a6e3a1">Fin</text>

  <!-- Vertical dividers -->
  <line x1="320" y1="0" x2="320" y2="300" class="divider"/>
  <line x1="560" y1="0" x2="560" y2="300" class="divider"/>

  <!-- Row 1 -->
  <rect x="0" y="44" width="780" height="42" fill="#181825"/>
  <text x="160" y="70" class="row-label">Vendor dependency</text>
  <text x="440" y="70" class="cell bad">High — Sierra team does the work</text>
  <text x="660" y="70" class="cell good">Low — your team owns it</text>

  <!-- Row 2 -->
  <rect x="0" y="86" width="780" height="42" fill="#1e1e2e"/>
  <text x="160" y="112" class="row-label">No-code control</text>
  <text x="440" y="112" class="cell bad">SDK only — requires engineers</text>
  <text x="660" y="112" class="cell good">Native no-code + CLI</text>

  <!-- Row 3 -->
  <rect x="0" y="128" width="780" height="42" fill="#181825"/>
  <text x="160" y="154" class="row-label">Claude workflow</text>
  <text x="440" y="154" class="cell bad">None — separate from AI tools</text>
  <text x="660" y="154" class="cell good">CLI built for Claude agents</text>

  <!-- Row 4 -->
  <rect x="0" y="170" width="780" height="42" fill="#1e1e2e"/>
  <text x="160" y="196" class="row-label">PRD → deployment</text>
  <text x="440" y="196" class="cell bad">Manual recreation required</text>
  <text x="660" y="196" class="cell good">Claude reads PRD, deploys direct</text>

  <!-- Row 5 -->
  <rect x="0" y="212" width="780" height="42" fill="#181825"/>
  <text x="160" y="238" class="row-label">Scaling updates</text>
  <text x="440" y="238" class="cell bad">Ticket Sierra team each time</text>
  <text x="660" y="238" class="cell good">Self-service, instant</text>

  <!-- Row 6 -->
  <rect x="0" y="254" width="780" height="42" fill="#1e1e2e"/>
  <text x="160" y="280" class="row-label">Setup time</text>
  <text x="440" y="280" class="cell neutral">Days to weeks</text>
  <text x="660" y="280" class="cell good">One Claude Code session</text>

  <!-- Bottom border -->
  <rect x="0" y="296" width="780" height="4" fill="#313244"/>
</svg>
