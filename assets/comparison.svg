<svg xmlns="http://www.w3.org/2000/svg" width="780" height="300" viewBox="0 0 780 300">
  <rect width="780" height="300" fill="#1e1e2e"/>

  <!-- Header row background -->
  <rect x="0" y="0" width="780" height="44" fill="#313244"/>

  <!-- Column headers -->
  <text x="200" y="27" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="14" font-weight="700" fill="#a6adc8" text-anchor="middle">Your concern</text>
  <text x="450" y="27" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="14" font-weight="700" fill="#f38ba8" text-anchor="middle">Sierra SDK (today)</text>
  <text x="665" y="27" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="14" font-weight="700" fill="#a6e3a1" text-anchor="middle">Fin</text>

  <!-- Vertical dividers -->
  <line x1="320" y1="0" x2="320" y2="300" stroke="#313244" stroke-width="1"/>
  <line x1="560" y1="0" x2="560" y2="300" stroke="#313244" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="0" y="44" width="780" height="42" fill="#181825"/>
  <text x="20" y="70" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">Vendor dependency</text>
  <text x="440" y="70" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle">High — Sierra team does the work</text>
  <text x="665" y="70" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">Low — your team owns it</text>

  <!-- Row 2 -->
  <rect x="0" y="86" width="780" height="42" fill="#1e1e2e"/>
  <text x="20" y="112" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">No-code control</text>
  <text x="440" y="112" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle">SDK only — requires engineers</text>
  <text x="665" y="112" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">Native no-code + CLI</text>

  <!-- Row 3 -->
  <rect x="0" y="128" width="780" height="42" fill="#181825"/>
  <text x="20" y="154" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">Claude workflow</text>
  <text x="440" y="154" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle">None — separate from AI tools</text>
  <text x="665" y="154" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">CLI built for Claude agents</text>

  <!-- Row 4 -->
  <rect x="0" y="170" width="780" height="42" fill="#1e1e2e"/>
  <text x="20" y="196" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">PRD → deployment</text>
  <text x="440" y="196" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle">Manual recreation required</text>
  <text x="665" y="196" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">Claude reads PRD, deploys direct</text>

  <!-- Row 5 -->
  <rect x="0" y="212" width="780" height="42" fill="#181825"/>
  <text x="20" y="238" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">Scaling updates</text>
  <text x="440" y="238" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f38ba8" text-anchor="middle">Ticket Sierra team each time</text>
  <text x="665" y="238" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">Self-service, instant</text>

  <!-- Row 6 -->
  <rect x="0" y="254" width="780" height="42" fill="#1e1e2e"/>
  <text x="20" y="280" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6adc8">Setup time</text>
  <text x="440" y="280" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#f9e2af" text-anchor="middle">Days to weeks</text>
  <text x="665" y="280" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#a6e3a1" text-anchor="middle">One Claude Code session</text>

  <!-- Bottom border -->
  <rect x="0" y="296" width="780" height="4" fill="#313244"/>
</svg>
