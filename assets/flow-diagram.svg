<svg xmlns="http://www.w3.org/2000/svg" width="780" height="200" viewBox="0 0 780 200">
  <rect width="780" height="200" fill="#1e1e2e"/>

  <!-- Box 1: PRD in Claude -->
  <rect x="20" y="60" width="140" height="80" fill="#313244" rx="8" ry="8"/>
  <text x="90" y="95" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="13" font-weight="600" fill="#cdd6f4" text-anchor="middle">PRD.md</text>
  <text x="90" y="114" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">Written in Claude</text>
  <text x="90" y="130" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6e3a1" text-anchor="middle">already done ✓</text>

  <!-- Arrow 1→2 -->
  <line x1="162" y1="100" x2="195" y2="100" stroke="#585b70" stroke-width="2"/>
  <polygon points="195,95 205,100 195,105" fill="#585b70"/>
  <text x="183" y="92" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">reads</text>

  <!-- Box 2: Claude Code -->
  <rect x="207" y="60" width="140" height="80" fill="#1e3a5f" rx="8" ry="8" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="277" y="95" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="13" font-weight="600" fill="#cdd6f4" text-anchor="middle">Claude Code</text>
  <text x="277" y="114" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">reads CLAUDE.md</text>
  <text x="277" y="130" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">no human steps</text>

  <!-- Arrow 2→3 -->
  <line x1="349" y1="100" x2="382" y2="100" stroke="#585b70" stroke-width="2"/>
  <polygon points="382,95 392,100 382,105" fill="#585b70"/>
  <text x="370" y="92" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">runs</text>

  <!-- Box 3: Fin CLI -->
  <rect x="394" y="60" width="140" height="80" fill="#2a1f3d" rx="8" ry="8" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="464" y="95" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="13" font-weight="600" fill="#cdd6f4" text-anchor="middle">Fin CLI</text>
  <text x="464" y="114" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">intercom setup</text>
  <text x="464" y="130" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">--articles-from ./docs</text>

  <!-- Arrow 3→4 -->
  <line x1="536" y1="100" x2="569" y2="100" stroke="#585b70" stroke-width="2"/>
  <polygon points="569,95 579,100 569,105" fill="#585b70"/>
  <text x="557" y="92" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="10" fill="#585b70" text-anchor="middle">deploys</text>

  <!-- Box 4: Fin Live -->
  <rect x="581" y="60" width="179" height="80" fill="#1a3a2a" rx="8" ry="8" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="670" y="88" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="13" font-weight="600" fill="#a6e3a1" text-anchor="middle">Fin Live ✓</text>
  <text x="670" y="107" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">Help center published</text>
  <text x="670" y="122" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">AI agent active</text>
  <text x="670" y="137" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="11" fill="#a6adc8" text-anchor="middle">Messenger snippet ready</text>

  <!-- Bottom label -->
  <text x="390" y="178" font-family="-apple-system, Helvetica Neue, sans-serif" font-size="12" fill="#585b70" text-anchor="middle">One Claude Code session. No platform back-and-forth. No vendor dependency.</text>
